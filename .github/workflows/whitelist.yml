name: Minecraft Whitelist Güncelle

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  whitelist:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu indir
        run: |
          curl -o whitelist_guncelle.py https://raw.githubusercontent.com/oyuncu8000/viox-whitelist/main/whitelist_guncelle.py

      - name: Paketleri kur
        run: pip install requests beautifulsoup4

      - name: Whitelist güncelle
        env:
          ADMIN_URL:  ${{ secrets.ADMIN_URL }}
          PANEL_URL:  ${{ secrets.PANEL_URL }}
          API_KEY:    ${{ secrets.API_KEY }}
          SERVER_ID:  ${{ secrets.SERVER_ID }}
        run: python whitelist_guncelle.py
